<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civic Ray | AI Legal Assistant</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="background-container">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="grid-overlay"></div>
    </div>

    <header>
        <div class="brand">
            <div class="logo-icon">
                <i class="fa-solid fa-scale-balanced"></i>
            </div>
            <span>Civic Ray</span>
        </div>

        <div class="controls">
            <div class="mode-toggle" onclick="toggleMode()">
                <div class="toggle-bg"></div>
                <div class="toggle-slider" id="slider"></div>
                <div class="mode-option active" id="citizen-opt">Citizen</div>
                <div class="mode-option" id="lawyer-opt">Lawyer</div>
            </div>

            <button class="btn-icon" onclick="downloadChat()" title="Download History">
                <i class="fa-solid fa-download"></i>
            </button>
        </div>
    </header>

    <main id="chat-scroller">
        <div class="chat-container" id="chat-box">
            
            <div class="hero-welcome" id="hero-msg">
                <h1 class="gradient-text">Hello.</h1>
                <p class="subtitle">I am Civic Ray. Your AI counsel for municipal laws.</p>
                <div class="status-badge"><i class="fa-solid fa-circle-check"></i> System Online</div>
            </div>

        </div>
        </main>

    <div class="input-area">
        <div class="suggestions" id="suggestions">
            <div class="pill" onclick="fillInput('My neighbor is building an illegal floor without permission. Draft a strict notice.')">
                <i class="fa-solid fa-hammer"></i> Illegal Construction
            </div>
        
            <div class="pill" onclick="fillInput('How can I challenge a wrongful traffic challan? Draft a contest letter.')">
                <i class="fa-solid fa-gavel"></i> Fight Wrongful Fine
            </div>
        
            <div class="pill" onclick="fillInput('Can I claim compensation from the municipality for car damage due to potholes?')">
                <i class="fa-solid fa-car-burst"></i> Pothole Damage
            </div>
        </div>

        <div class="input-wrapper">
            <input type="text" id="user-input" placeholder="Ask about regulations, fines, or drafts..." autocomplete="off" onkeypress="handleEnter(event)">
            <button class="send-btn" onclick="sendMessage()">
                <i class="fa-solid fa-arrow-up"></i>
            </button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
